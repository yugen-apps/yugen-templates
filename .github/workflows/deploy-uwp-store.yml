on:
  workflow_call:
    inputs:
      artifact_name:
        required: true
        type: string
      artifact_dir:
        required: false
        type: string
        default: "artifact"
      project_version:
        required: true
        type: string
      store_app_id:
        required: true
        type: string
    secrets:
      azure_client_id:
        required: true
      azure_client_secret:
        required: true
      azure_tenant_id:
        required: true
      azure_subscription_id:
        required: true
      store_seller_id:
        required: true

jobs:
  deploy_nuget_job:
    runs-on: ubuntu-latest
    steps:
      
      - name: debug_vars
        shell: pwsh
        run: |
          Write-Host "artifact_name: ${{ inputs.artifact_name }}"
          Write-Host "artifact_dir: ${{ inputs.artifact_dir }}"
          Write-Host "nuget_api_key: ${{ secrets.nuget_api_key }}"

      - name: artifact_download
        uses: actions/download-artifact@v8
        with:
          name: "${{ inputs.artifact_name }}"
          path: "${{ inputs.artifact_dir }}"

      - name: debug_artifact_dir
        continue-on-error: true
        shell: pwsh
        working-directory: "./${{ inputs.artifact_dir }}"
        run: |
          Get-ChildItem -Recurse
        
      - name: store_publish
        uses: isaacrlevin/windows-store-action@1.0
        with:
          tenant-id: ${{ secrets.azure_tenant_id }}
          client-id: ${{ secrets.azure_client_id }}
          client-secret: ${{ secrets.azure_client_secret }}
          app-id: ${{ inputs.store_app_id }}
          package-path: "${{ inputs.artifact_dir }}"

      - uses: softprops/action-gh-release@v3
        name: add_release        
        with:
          tag_name: "${{ inputs.project_version }}"