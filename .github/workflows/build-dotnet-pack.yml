on:
  workflow_call:
    inputs:
      dotnet_cache:
        required: false
        type: boolean
        default: false
      dotnet_version:
        required: false
        type: string
        default: "10"
      project_configuration:
        required: false
        type: string
        default: "Release"
      project_name:
        required: true
        type: string
      project_version:
        required: false
        type: string
        default: "0.0.1"
      artifact_dir:
        required: false
        type: string
        default: "pack"

jobs:
  build_dotnet_pack_job:
    runs-on: windows-2025-vs2026
    steps:

      - name: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: debug_vars
        shell: pwsh
        run: |
          Write-Host "dotnet_cache: ${{ inputs.dotnet_cache }}"
          Write-Host "dotnet_version: ${{ inputs.dotnet_version }}"
          Write-Host "project_configuration: ${{ inputs.project_configuration }}"
          Write-Host "project_name: ${{ inputs.project_name }}"
          Write-Host "project_version: ${{ inputs.project_version }}"
          Write-Host "artifact_dir: ${{ inputs.artifact_dir }}"

      # - name: dotnet_setup
      #   uses: actions/setup-dotnet@v5
      #   with:
      #     dotnet-version: "${{ inputs.dotnet_version }}.x"
      #     cache: "${{ inputs.dotnet_cache }}"

      # https://github.com/actions/cache/blob/v5/examples.md#c---nuget
      - name: set_nuget_cache
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: debug_dir
        shell: pwsh
        run: |
          Get-ChildItem -Recurse

      - name: dotnet_build
        continue-on-error: true
        shell: pwsh
        run: >
          dotnet build "${{ inputs.project_name }}"
          --configuration "${{ inputs.project_configuration }}"
          --property:PackageVersion="${{ inputs.project_version }}"
          --property:Version="${{ inputs.project_version }}"

      - name: dotnet_pack
        continue-on-error: true
        shell: bash
        run: >
          dotnet pack "${{ inputs.project_name }}"
          --configuration "${{ inputs.project_configuration }}"
          --output "./${{ inputs.artifact_dir }}/${{ inputs.project_name }}"
          --property:PackageVersion="${{ inputs.project_version }}"
          --property:Version="${{ inputs.project_version }}"

      - name: debug_artifact_dir
        continue-on-error: true
        shell: pwsh
        working-directory: "./${{ inputs.artifact_dir }}/${{ inputs.project_name }}"
        run: |
          Get-ChildItem -Recurse

      - name: artifact_upload
        uses: actions/upload-artifact@v7
        with:
          name: "${{ inputs.project_name }}"
          path: "./${{ inputs.artifact_dir }}/${{ inputs.project_name }}"